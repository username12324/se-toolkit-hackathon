# Docker Compose for the Hydration + Event Broadcast System
#
# Usage:
#   docker compose up --build       # start bot, web, and database
#   docker compose down             # stop (keeps data)
#   docker compose down -v          # stop AND delete persistent data

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: hydration-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hydration_bot}
      POSTGRES_USER: ${DB_USER:-hydration_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hydration_user} -d ${DB_NAME:-hydration_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hydration-net

  # ── Telegram Bot (water reminders + broadcast scheduler) ─────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydration-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_NAME: ${DB_NAME:-hydration_bot}
      DB_USER: ${DB_USER:-hydration_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: db
      DB_PORT: 5432
    healthcheck:
      test: ["CMD", "python", "-c", "import telegram; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hydration-net

  # ── Web Dashboard (organizer broadcast management) ───────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: hydration-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      DB_DSN: postgresql://${DB_USER:-hydration_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-hydration_bot}
    networks:
      - hydration-net

volumes:
  postgres_data:

networks:
  hydration-net:
    driver: bridge
